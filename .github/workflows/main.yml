name: CI

on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:

env:
  TZ: Asia/Tokyo

jobs:
  generate:
    name: Generate files
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    concurrency:
      group: auto-generate-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
      - run: go install tool
      - run: go generate ./openapi
      - run: go generate -run "wire" ./...
      - name: Auto-commit generated files
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(openapi/server.go openapi/spec.go openapi/types.go wire_gen.go)
          if ! git diff --quiet -- "${files[@]}"; then
            git add "${files[@]}"
            git commit -m "chore: regenerate generated files [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify generated files are committed
        if: github.event_name != 'pull_request' || github.actor == 'github-actions[bot]' || github.event.pull_request.head.repo.full_name != github.repository
        run: |
          files=(openapi/server.go openapi/spec.go openapi/types.go wire_gen.go)
          if ! git diff --quiet -- "${files[@]}"; then
            echo "Generated files are out of date. Run generation locally and commit the results." >&2
            git diff -- "${files[@]}"
            exit 1
          fi
  mod:
    name: Mod
    runs-on: ubuntu-24.04
    needs: [generate]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
      - run: go mod download
  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [mod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
      - run: go build -o anke-to
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: anke-to
          path: anke-to
  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: [mod]
    services:
      mysql:
        image: mariadb:12.1.2
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: anke-to
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
      - run: go install go.uber.org/mock/mockgen@v0.6.0
      - run: go generate ./model ./traq
      - run: go test ./model -v -coverprofile=coverage-model.txt -race -vet=off
        env:
          ENV: test
          PORT: :1323
          MARIADB_USERNAME: root
          MARIADB_PASSWORD: password
          MARIADB_HOSTNAME: 127.0.0.1
          MARIADB_DATABASE: anke-to
          MARIADB_PORT: 3306
          TRAQ_BOT_TOKEN: ""
          TRAQ_WEBHOOK_ID: ""
          TRAQ_WEBHOOK_SECRET: ""
      - run: go test ./controller -v -coverprofile=coverage-controller.txt -race -vet=off
        env:
          ENV: test
          PORT: :1323
          MARIADB_USERNAME: root
          MARIADB_PASSWORD: password
          MARIADB_HOSTNAME: 127.0.0.1
          MARIADB_DATABASE: anke-to
          MARIADB_PORT: 3306
          TRAQ_BOT_TOKEN: ""
          TRAQ_WEBHOOK_ID: ""
          TRAQ_WEBHOOK_SECRET: ""
      - name: Upload coverage data
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ./coverage-model.txt ./coverage-controller.txt
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-model.txt
          path: coverage-model.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-controller.txt
          path: coverage-controller.txt
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: [mod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
      - run: go install go.uber.org/mock/mockgen@v0.6.0
      - run: go generate ./model ./traq
      - name: golangci-lint
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          reporter: github-pr-check
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_level: error
          cache: false
  spectral:
    name: Spectral
    runs-on: ubuntu-24.04
    needs: [mod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - name: Spectral checks
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141 # v0.8.13
        with:
          file_glob: docs/swagger/*.yaml
