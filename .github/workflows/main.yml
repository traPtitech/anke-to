name: CI

on:
  push:
    branches:
      - 'main'
      - 'develop'
  pull_request:

env:
  TZ: Asia/Tokyo

jobs:
  mod:
    name: Mod
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go mod download
  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [mod]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go build -o anke-to
      - uses: actions/upload-artifact@v4
        with:
          name: anke-to
          path: anke-to
  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: [mod]
    services:
      mysql:
        image: mariadb:12.1.2
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: anke-to
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go install go.uber.org/mock/mockgen@v0.6.0
      - run: go generate ./model ./traq
      - run: go test ./model -v -coverprofile=coverage-model.txt -race -vet=off
        env:
          ENV: test
          PORT: :1323
          MARIADB_USERNAME: root
          MARIADB_PASSWORD: password
          MARIADB_HOSTNAME: 127.0.0.1
          MARIADB_DATABASE: anke-to
          MARIADB_PORT: 3306
          TRAQ_BOT_TOKEN: ""
          TRAQ_WEBHOOK_ID: ""
          TRAQ_WEBHOOK_SECRET: ""
      - run: go test ./controller -v -coverprofile=coverage-controller.txt -race -vet=off
        env:
          ENV: test
          PORT: :1323
          MARIADB_USERNAME: root
          MARIADB_PASSWORD: password
          MARIADB_HOSTNAME: 127.0.0.1
          MARIADB_DATABASE: anke-to
          MARIADB_PORT: 3306
          TRAQ_BOT_TOKEN: ""
          TRAQ_WEBHOOK_ID: ""
          TRAQ_WEBHOOK_SECRET: ""
      - name: Upload coverage data
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-model.txt ./coverage-controller.txt
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-model.txt
          path: coverage-model.txt
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-controller.txt
          path: coverage-controller.txt
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go install go.uber.org/mock/mockgen@v0.6.0
      - run: go generate ./model ./traq
      - name: golangci-lint
        uses: reviewdog/action-golangci-lint@v2
        with:
          reporter: github-pr-check
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_level: error
          cache: false
  spectral:
    name: Spectral
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Spectral checks
        uses: stoplightio/spectral-action@v0.8.13
        with:
          file_glob: docs/swagger/*.yaml
