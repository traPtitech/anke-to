version: "3"

services:
  anke-to:
    build:
      context: ../..
      dockerfile: docker/test/Dockerfile
    environment:
      CGO_ENABLED: 0
      ENV: test
      MARIADB_USERNAME: root
      MARIADB_PASSWORD: password
      MARIADB_HOSTNAME: mysql
      MARIADB_PORT: 3306
      MARIADB_DATABASE: anke-to
      TRAQ_BOT_TOKEN:
      TRAQ_WEBHOOK_ID:
      TRAQ_WEBHOOK_SECRET:
      TZ: Asia/Tokyo
    volumes:
      - ../../:/go/src/github.com/traPtitech/anke-to
    restart: on-failure
    depends_on:
      - mysql

  mysql:
    image: mariadb:12.1.2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: anke-to
      TZ: Asia/Tokyo
    expose:
      - "3306"
